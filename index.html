<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8'>
    <title>Library</title>
    <link href='style.css' rel='stylesheet'>
    <script src='library.js' defer></script>
  </head>
  <body>
    <div class='header-section'>
      <h1>Library</h1>
      <div class='counts'>
        <div class='count total-count'>Total: </div>
        <div class='count finished-count'>Finished: </div>
        <div class='count reading-count'>Reading: </div>
        <div class='count not-started-count'>Not started: </div>
      </div>
    </div>
    <div class='add-book-section'>
      <h2>Add book</h2>
      <form id='add-book' action='' method='post'>
        <label for='entered-title'>Title</label>
        <input id='entered-title' name='entered-title' type='text' required>
        <label for='entered-author'>Author</label>
        <input id='entered-author' name='entered-author' type='text'>
        <label for='selected-status'>Status</label>
        <select id='selected-status' name='selected-status' required>
          <option value='finished'>finished</option>
          <option value='reading'>reading</option>
          <option value='not started' selected>not started</option>
        </select>
        <button type='submit'>Add</button>
      </form>
    </div>
    <div class='books-section'>
      <h2>Books</h2>
      <div class='books'>
        <div class='column-headers'>
          <h3>Title</h3>
          <h3>Author</h3>
          <h3>Status</h3>
        </div>
      </div>
    </div>
  </body>
</html>
